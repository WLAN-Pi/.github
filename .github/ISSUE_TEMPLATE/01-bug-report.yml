name: 🐛 Bug report
description: Create a report to help us fix something
title: "[BUG]: <title>"
labels: ['bug', 'untriaged']
body:
  - type: markdown
    attributes:
      value: |
        Before filing, check if this issue already exists. For usage questions, use [discussions](https://github.com/WLAN-Pi/feedback/discussions) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the bug and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: WLAN Pi OS version, package version, or any other relevant version reference.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Optional but very helpful.
      render: shell
    validations:
      required: false
